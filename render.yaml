      - key: NEXT_PUBLIC_API_URL
        value: https://modology-backend.onrender.com
      - key: NEXTAUTH_SECRET
        value: your-random-secret-key-change-this-in-production
      - key: NEXTAUTH_URL
        value: https://modology-backend.onrender.com
